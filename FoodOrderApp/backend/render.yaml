services:
  - type: web
    name: food-order-backend
    env: node
    rootDir: FoodOrderApp/backend
    buildCommand: npm install
    startCommand: npm start
    branch: main
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
